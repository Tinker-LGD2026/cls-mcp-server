# CLS MCP Server - Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cls-mcp-server
  labels:
    app: cls-mcp-server
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cls-mcp-server
  template:
    metadata:
      labels:
        app: cls-mcp-server
    spec:
      containers:
        - name: cls-mcp-server
          image: cls-mcp-server:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: cls-mcp-server-config
            - secretRef:
                name: cls-mcp-server-secret
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /readiness
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      # 非 root 运行
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
