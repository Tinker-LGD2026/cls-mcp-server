# CLS MCP Server - Kubernetes Secret
# 敏感配置（密钥）
# 注意：生产环境建议使用 External Secrets Operator 或 HashiCorp Vault
apiVersion: v1
kind: Secret
metadata:
  name: cls-mcp-server-secret
  labels:
    app: cls-mcp-server
type: Opaque
stringData:
  # 替换为实际的腾讯云密钥
  CLS_SECRET_ID: "your-secret-id-here"
  CLS_SECRET_KEY: "your-secret-key-here"
  # HTTP Bearer Token 认证（建议生产环境设置）
  MCP_AUTH_TOKEN: ""
