{{- if .Values.secret.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cls-mcp-server.fullname" . }}-secret
  labels:
    {{- include "cls-mcp-server.labels" . | nindent 4 }}
type: Opaque
stringData:
  CLS_SECRET_ID: {{ .Values.secret.secretId | quote }}
  CLS_SECRET_KEY: {{ .Values.secret.secretKey | quote }}
  {{- if .Values.secret.authToken }}
  MCP_AUTH_TOKEN: {{ .Values.secret.authToken | quote }}
  {{- end }}
{{- end }}
