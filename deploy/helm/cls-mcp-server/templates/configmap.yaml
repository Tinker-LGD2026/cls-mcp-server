apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "cls-mcp-server.fullname" . }}-config
  labels:
    {{- include "cls-mcp-server.labels" . | nindent 4 }}
data:
  CLS_REGION: {{ .Values.config.region | quote }}
  CLS_TRANSPORT: {{ .Values.config.transport | quote }}
  CLS_HOST: {{ .Values.config.host | quote }}
  CLS_PORT: {{ .Values.config.port | quote }}
  CLS_STATELESS_HTTP: {{ .Values.config.statelessHttp | quote }}
  CLS_ENABLE_WRITE: {{ .Values.config.enableWrite | quote }}
  CLS_ENABLE_DANGEROUS: {{ .Values.config.enableDangerous | quote }}
  CLS_LOG_LEVEL: {{ .Values.config.logLevel | quote }}
